<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cityscape</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      cursor: pointer;
      clip-path: inset(150% 5% 5% 5%);
      transition: filter 0.6s ease;
    }

    .morning {
      filter: brightness(1.1) saturate(1.1) hue-rotate(-10deg);
    }

    .day {
      filter: brightness(1.3) saturate(1.2);
    }

    .dawn {
      filter: brightness(0.9) saturate(1.3) hue-rotate(20deg);
    }

    .night {
      filter: brightness(0.5) saturate(0.8) hue-rotate(200deg);
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="scene" src="cityscape.png" class="morning" />
  </div>

  <script>
    const modes = ["morning", "day", "dawn", "night"];
    let index = 0;

    const img = document.getElementById("scene");

    img.addEventListener("click", () => {
      index = (index + 1) % modes.length;
      img.className = modes[index];
    });
  </script>
</body>
</html>
